<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Lernkartei: Zahlwörter & Verben</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --secondary-green: #4caf50;
            --light-green: #e8f5e9;
            --background-bg: #f1f8e9;
            --text-color: #1b5e20;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--primary-green);
        }

        .progress {
            margin-top: 10px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Flashcard Container */
        .card-container {
            width: 100%;
            max-width: 500px;
            height: 300px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--card-shadow);
            border-radius: 20px;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border-radius: 20px;
            background: white;
            border: 4px solid var(--secondary-green);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: var(--light-green);
        }

        .vocab-text {
            font-size: 2.2rem;
            font-weight: bold;
            word-wrap: break-word;
            max-width: 100%;
            line-height: 1.2;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 15px;
            position: absolute;
            top: 20px;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 600px;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: var(--primary-green);
            color: white;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: var(--secondary-green);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background-color: white;
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
        }

        button.secondary:hover {
            background-color: var(--light-green);
        }

        /* Responsive */
        @media (max-width: 500px) {
            .card-container {
                height: 250px;
            }
            .vocab-text {
                font-size: 1.6rem;
            }
            button {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }

        /* Keyboard Info */
        .keyboard-info {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #666;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Russisch Lernkartei</h1>
        <div class="progress" id="progress">1 / 91</div>
    </div>

    <div class="card-container" id="cardContainer" onclick="flipCard()" tabindex="0">
        <div class="card-inner" id="cardInner">
            <div class="card-face card-front">
                <div class="label">Russisch</div>
                <div class="vocab-text" id="frontText">оди́н</div>
            </div>
            <div class="card-face card-back">
                <div class="label">Deutsch</div>
                <div class="vocab-text" id="backText">eins (m.)</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="secondary" onclick="prevCard()">← Vorherige</button>
        <button onclick="shuffleCards()">🔀 Mischen</button>
        <button class="secondary" onclick="nextCard()">Nächste →</button>
        <button class="secondary" onclick="goToStart()" style="width: 100%;">🏠 An den Anfang (Pos1)</button>
    </div>

    <div class="keyboard-info">
        Steuerung: <b>Pfeiltasten</b> für Zurück/Weiter | <b>Leertaste/Enter</b> zum Umdrehen | <b>Pos1</b> zum Anfang
    </div>

    <script>
        const rawVocab = `оди́н	eins (m.)
одна́	eins (f.)
одно́	eins (n.)
одни́	eins (pl.) / einige / nur
два	zwei (m./n.)
две	zwei (f.)
три	drei
четы́ре	vier
расска́зывать / рассказа́ть	erzählen
ви́деть / уви́деть	sehen
подходи́ть / подойти́	herantreten / zugehen auf
говори́ть / сказа́ть	sprechen / sagen
слы́шать / услы́шать	hören
изменя́ть / измени́ть	ändern / verändern
испо́льзовать / воспо́льзоваться	verwenden / benutzen
дари́ть / подари́ть	schenken
увлека́ться / увле́чься	sich begeistern für / schwärmen für
звони́ть / позвони́ть	anrufen
писа́ть / написа́ть	schreiben
покупа́ть / купи́ть	kaufen
зна́ть / узна́ть	wissen / erfahren
жить / пожи́ть	leben / wohnen
рабо́тать / порабо́тать	arbeiten
интересова́ться / заинтересова́ться	sich interessieren
слова́рь	Wörterbuch
крова́ть	Bett
сло́во	Wort
перча́тки	Handschuhe
брю́ки	Hose
зда́ние	Gebäude
кот	Kater
соба́ка	Hund
студе́нт	Student
студе́нтка	Studentin
о́зеро	See
специали́ст	Spezialist / Fachkraft
вид спо́рта	Sportart
спортсме́н	Sportler
моде́ль	Modell
суперма́ркет	Supermarkt
кио́ск	Kiosk
стихотворе́ние	Gedicht
поэ́т	Poet / Dichter
карти́на	Bild / Gemälde
авто́р	Autor
заня́тие	Unterricht / Beschäftigung
дере́вня	Dorf
челове́к	Mensch
слу́чай	Fall / Vorfall / Ereignis
страна́	Land
подру́га	Freundin
друг	Freund
кни́га	Buch
журна́л	Zeitschrift
газе́та	Zeitung
окно́	Fenster
каранда́ш	Bleistift
стул	Stuhl
худо́жник	Maler / Künstler
шкаф	Schrank
ко́мната	Zimmer
упражне́ние	Übung
пое́здка	Reise / Fahrt
Росси́я	Russland
Се́рбия	Serbien
интере́сный	interessant
краси́вый	schön
но́вый	neu
высо́кий	hoch / großgewachsen
дли́нный	lang
у́мный	klug / intelligent
хоро́ший	gut
плохо́й	schlecht
тру́дный	schwierig / schwer
зелёный	grün
изве́стный	bekannt
ста́рый	alt
доро́гой	teuer / wertvoll
си́ний	blau
бе́лый	weiß
злой	böse
vчера́	gestern
за́втра	morgen
здесь	hier
там	dort
одна́жды	eines Tages / einmal
никогда́	niemals
всегда́	immer
ве́чером	abends
у́тром	morgens
про́шлым ле́том	letzten Sommer`;

        let vocabList = [];
        let currentIndex = 0;

        // Vokabeln verarbeiten
        function parseVocab() {
            const lines = rawVocab.trim().split('\n');
            vocabList = lines.map(line => {
                const parts = line.split('\t');
                return {
                    front: parts[0].trim(),
                    back: parts[1].trim()
                };
            });
        }

        function updateCard() {
            const card = vocabList[currentIndex];
            const frontEl = document.getElementById('frontText');
            const backEl = document.getElementById('backText');
            
            frontEl.textContent = card.front;
            backEl.textContent = card.back;

            // Dynamische Schriftgröße
            adjustFontSize(frontEl, card.front);
            adjustFontSize(backEl, card.back);

            document.getElementById('cardContainer').classList.remove('flipped');
            document.getElementById('progress').textContent = `${currentIndex + 1} / ${vocabList.length}`;
        }

        function adjustFontSize(element, text) {
            if (text.length > 25) {
                element.style.fontSize = "1.2rem";
            } else if (text.length > 15) {
                element.style.fontSize = "1.6rem";
            } else {
                element.style.fontSize = "2.2rem";
            }
        }

        function flipCard() {
            document.getElementById('cardContainer').classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < vocabList.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        function shuffleCards() {
            for (let i = vocabList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [vocabList[i], vocabList[j]] = [vocabList[j], vocabList[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        function goToStart() {
            currentIndex = 0;
            updateCard();
        }

        // Tastatursteuerung
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextCard();
            } else if (e.key === 'ArrowLeft') {
                prevCard();
            } else if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault(); // Verhindert Scrolling bei Leertaste
                flipCard();
            } else if (e.key === 'Home') {
                goToStart();
            }
        });

        // Initialisierung
        parseVocab();
        updateCard();
    </script>
</body>
</html>
