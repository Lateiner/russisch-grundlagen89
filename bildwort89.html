<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Pluralia Tantum (10 Beispiele)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .instruction {
            font-size: 0.95rem;
            color: #555;
            margin-bottom: 20px;
        }

        /* Bild-Bereich */
        .image-display {
            font-size: 5rem;
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid #eee;
        }

        .item-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        /* Antwort-Optionen */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-btn {
            background: white;
            border: 2px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s;
            color: var(--primary-color);
            user-select: none;
        }

        .option-btn:hover {
            border-color: var(--accent-color);
            background: #f0f8ff;
        }

        /* Feedback-Klassen */
        .correct {
            background-color: var(--success-color) !important;
            border-color: var(--success-color) !important;
            color: white !important;
        }

        .wrong {
            background-color: var(--error-color) !important;
            border-color: var(--error-color) !important;
            color: white !important;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress {
            font-size: 0.9rem;
            color: #777;
        }

        #next-btn, #reset-btn {
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #next-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Eins oder eins? (один vs. одни)</h1>
    <p class="instruction">Wähle die richtige Kombination für den Gegenstand auf dem Bild.</p>

    <div id="game-ui">
        <div class="image-display" id="current-icon">✂️</div>
        <div class="item-name" id="current-noun">ножницы</div>

        <div class="options-grid" id="options">
            <!-- Buttons werden per JS erzeugt -->
        </div>

        <div class="controls">
            <span class="progress" id="progress-text">Aufgabe 1 von 10</span>
            <button id="next-btn" onclick="nextQuestion()" disabled>Weiter</button>
        </div>
    </div>

    <div id="result-ui" style="display: none;">
        <h2>Ergebnis</h2>
        <p id="score-text" style="font-size: 1.2rem; margin-bottom: 20px;"></p>
        <button id="reset-btn" onclick="initGame()">Neustart</button>
    </div>
</div>

<script>
    const quizData = [
        { icon: '✂️', noun: 'ножницы (Schere)', correct: 'одни ножницы', options: ['одна ножницы', 'один ножницы', 'одни ножницы', 'одно ножницы'] },
        { icon: '👖', noun: 'брюки (Hose)', correct: 'одни брюки', options: ['одна брюки', 'одни брюки', 'один брюки', 'одно брюки'] },
        { icon: '👓', noun: 'очки (Brille)', correct: 'одни очки', options: ['одни очки', 'одна очки', 'один очки', 'одно очки'] },
        { icon: '⌚', noun: 'часы (Uhr)', correct: 'одни часы', options: ['одна часы', 'одно часы', 'одни часы', 'один часы'] },
        { icon: '🧤', noun: 'перчатки (Handschuhe)', correct: 'одни перчатки', options: ['одна перчатки', 'одни перчатки', 'один перчатки', 'одно перчатки'] },
        { icon: '💵', noun: 'деньги (Geld)', correct: 'одни деньги', options: ['один деньги', 'одна деньги', 'одно деньги', 'одни деньги'] },
        { icon: '♟️', noun: 'шахматы (Schach)', correct: 'одни шахматы', options: ['одна шахматы', 'одни шахматы', 'один шахматы', 'одно шахматы'] },
        { icon: '🧴', noun: 'духи (Parfüm)', correct: 'одни духи', options: ['одно духи', 'одна духи', 'одни духи', 'один духи'] },
        { icon: '👖', noun: 'джинсы (Jeans)', correct: 'одни джинсы', options: ['одни джинсы', 'одна джинсы', 'один джинсы', 'одно джинсы'] },
        { icon: '🧦', noun: 'носки (Socken)', correct: 'одни носки', options: ['одна носки', 'один носки', 'одни носки', 'одно носки'] }
    ];

    let currentIndex = 0;
    let score = 0;
    let answered = false;

    function initGame() {
        currentIndex = 0;
        score = 0;
        // Fragen mischen für mehr Abwechslung
        quizData.sort(() => Math.random() - 0.5);
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('result-ui').style.display = 'none';
        showQuestion();
    }

    function showQuestion() {
        answered = false;
        document.getElementById('next-btn').disabled = true;
        const data = quizData[currentIndex];
        
        document.getElementById('current-icon').textContent = data.icon;
        document.getElementById('current-noun').textContent = data.noun;
        document.getElementById('progress-text').textContent = `Aufgabe ${currentIndex + 1} von ${quizData.length}`;

        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        // Antwortmöglichkeiten mischen
        const shuffledOptions = [...data.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(btn, opt);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(btn, choice) {
        if (answered) return;
        answered = true;
        
        const correct = quizData[currentIndex].correct;
        const allBtns = document.querySelectorAll('.option-btn');

        if (choice === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            // Richtige Antwort automatisch grün markieren
            allBtns.forEach(b => {
                if (b.textContent === correct) b.classList.add('correct');
            });
        }

        document.getElementById('next-btn').disabled = false;
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < quizData.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';
        document.getElementById('score-text').textContent = `Fertig! Du hast ${score} von ${quizData.length} Punkten erreicht.`;
    }

    // Start des Quiz beim Laden der Seite
    initGame();
</script>

</body>
</html>
